apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudassist-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudassist-frontend
  template:
    metadata:
      labels:
        app: cloudassist-frontend
    spec:
      containers:
        - name: frontend
          image: europe-west1-docker.pkg.dev/kubernetes-cloud-workshop/cloudassist/frontend:workshop-v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: cloudassist-frontend
spec:
  selector:
    app: cloudassist-frontend
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
