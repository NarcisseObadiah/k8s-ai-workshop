apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudassist-backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cloudassist-backend
  template:
    metadata:
      labels:
        app: cloudassist-backend
    spec:
      serviceAccountName: cloudassist-backend
      containers:
        - name: backend
          image: europe-west1-docker.pkg.dev/kubernetes-cloud-workshop/cloudassist/backend:workshop-v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: GOOGLE_CLOUD_PROJECT
              value: kubernetes-cloud-workshop
            - name: GOOGLE_CLOUD_LOCATION
              value: global
            - name: GEMINI_MODEL
              value: gemini-3.1-flash-lite
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: cloudassist-backend
  ports:
    - name: http
      port: 8080
      targetPort: http
  type: ClusterIP
