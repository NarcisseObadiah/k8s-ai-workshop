apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cloudassist-backend
  namespace: cloudassist
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cloudassist-backend

  minReplicas: 1
  maxReplicas: 3

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 30

  behavior:
    scaleDown:
      stabilizationWindowSeconds: 60
