apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudassist-participant
rules:
  # View Pods and events.
  - apiGroups: [""]
    resources:
      - pods
      - events
    verbs:
      - get
      - list
      - watch

  # Read container logs.
  - apiGroups: [""]
    resources:
      - pods/log
    verbs:
      - get

  # Delete Pods for the self-healing exercise.
  - apiGroups: [""]
    resources:
      - pods
    verbs:
      - delete
      - deletecollection

  # Use kubectl port-forward.
  - apiGroups: [""]
    resources:
      - pods/portforward
    verbs:
      - create

  # View the pre-created Kubernetes service account.
  - apiGroups: [""]
    resources:
      - serviceaccounts
    verbs:
      - get
      - list
      - watch

  # Manage internal Services and ConfigMaps.
  - apiGroups: [""]
    resources:
      - services
      - configmaps
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # Manage application Deployments.
  - apiGroups: ["apps"]
    resources:
      - deployments
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete

  # Inspect ReplicaSets created by Deployments.
  - apiGroups: ["apps"]
    resources:
      - replicasets
    verbs:
      - get
      - list
      - watch

  # Scale Deployments.
  - apiGroups: ["apps"]
    resources:
      - deployments/scale
    verbs:
      - get
      - update
      - patch

  # Optional HPA exercise.
  - apiGroups: ["autoscaling"]
    resources:
      - horizontalpodautoscalers
    verbs:
      - get
      - list
      - watch
      - create
      - update
      - patch
      - delete
